name: Publisher

on:
  push:
  schedule:
    - cron: 0 2 * * *
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.1.0
        with:
          node-version-file: '.nvm'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  scrape:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.1.0
        with:
          node-version-file: '.nvm'
          cache: 'npm'
      - run: npm ci --omit=dev
      - name: Restore repo cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: repo-cache-chunk${{ matrix.chunk }}-${{ github.run_id }}
          restore-keys: |
            repo-cache-chunk${{ matrix.chunk }}-
      - run: |
          for i in {1..3}; do
            node index.js get-all -w ./chunk-${{ matrix.chunk }}.json --cache-dir ./cache --chunk ${{ matrix.chunk }} --total-chunks 4 && break
            if [ $i -eq 3 ]; then exit 1; fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4.4.3
        with:
          name: chunk-${{ matrix.chunk }}
          path: chunk-${{ matrix.chunk }}.json

  build:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/download-artifact@v4.1.8
        with:
          pattern: chunk-*
          merge-multiple: true
      - name: Merge chunks
        run: |
          node -e "
          const fs = require('fs');
          const chunks = [0,1,2,3].map(i => JSON.parse(fs.readFileSync('chunk-'+i+'.json','utf8')));
          const all = chunks.flat();
          fs.writeFileSync('./public/repos.json', JSON.stringify(all, null, 2));
          console.log('Merged ' + chunks.length + ' chunks: ' + all.length + ' repos');
          "
      - run: tar -cf public.tar ./public
      - uses: actions/upload-artifact@v4.4.3
        with:
          name: public.tar
          path: public.tar

  sbom:
    needs: build
    if: github.ref == 'refs/heads/master'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.1.0
        with:
          node-version-file: '.nvm'
          cache: 'npm'
      - run: npm ci --omit=dev
      - uses: actions/download-artifact@v4.1.8
        with:
          name: public.tar
      - run: tar -xf public.tar
      - name: Restore SBOM cache
        uses: actions/cache@v4
        with:
          path: sbom-cache/
          key: sbom-cache-${{ github.run_id }}
          restore-keys: |
            sbom-cache-
      - name: Fetch SBOMs (incremental)
        run: node index.js fetch-sboms --repos-file ./public/repos.json --cache-dir ./sbom-cache --budget 95 --max-hours 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish SBOMs
        run: node index.js publish-sboms --repos-file ./public/repos.json --cache-dir ./sbom-cache --output-dir ./public
      - run: tar -cf public.tar ./public
      - uses: actions/upload-artifact@v4.4.3
        with:
          name: public.tar
          path: public.tar
          overwrite: true

  publish:
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    needs:
      - build
      - sbom
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          name: public.tar
      - run: tar -xf public.tar
      - uses: actions/configure-pages@v5.0.0
      - uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
