name: Publisher

on:
  push:
  schedule:
    - cron: 0 2 * * *
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.1.0
        with:
          node-version-file: '.nvm'
      - run: npm install
      - run: npm test

  scrape:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.1.0
        with:
          node-version-file: '.nvm'
      - run: npm install
      - name: Restore repo cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: repo-cache-chunk${{ matrix.chunk }}-${{ github.run_id }}
          restore-keys: |
            repo-cache-chunk${{ matrix.chunk }}-
      - run: |
          for i in {1..3}; do
            node index.js get-all -w ./chunk-${{ matrix.chunk }}.json --cache-dir ./cache --chunk ${{ matrix.chunk }} --total-chunks 4 && break
            if [ $i -eq 3 ]; then exit 1; fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4.4.3
        with:
          name: chunk-${{ matrix.chunk }}
          path: chunk-${{ matrix.chunk }}.json

  build:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.1.0
        with:
          node-version-file: '.nvm'
      - run: npm install
      - uses: actions/download-artifact@v4.1.8
        with:
          pattern: chunk-*
          merge-multiple: true
      - run: node index.js merge-chunks chunk-0.json chunk-1.json chunk-2.json chunk-3.json -w ./public/repos.json
      - run: tar -cf public.tar ./public
      - uses: actions/upload-artifact@v4.4.3
        with:
          name: public.tar
          path: public.tar

  publish:
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    needs:
      - build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          name: public.tar
      - run: tar -xf public.tar
      - uses: actions/configure-pages@v5.0.0
      - uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
